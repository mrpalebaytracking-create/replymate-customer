<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReplyMate Pro — Command Centre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070810;--surface:#0d0f1a;--card:#111420;--card2:#161928;
  --border:#1c2035;--border2:#242840;
  --green:#00d68f;--green-dim:#00d68f22;--green-mid:#00d68f55;
  --blue:#4361ee;--blue-dim:#4361ee22;
  --amber:#f7b731;--amber-dim:#f7b73122;
  --red:#ef4444;--red-dim:#ef444422;
  --purple:#a855f7;--purple-dim:#a855f722;
  --text:#e2e8f0;--muted:#8892a4;--dim:#4a5568;
  --font-head:'Syne',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --font-body:'DM Sans',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,#4361ee0d,transparent),radial-gradient(ellipse 60% 40% at 90% 80%,#00d68f07,transparent);pointer-events:none;z-index:0}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1}
.login-card{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:48px 40px;width:100%;max-width:420px;text-align:center}
.login-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px}
.login-logo-mark{width:44px;height:44px;background:linear-gradient(135deg,var(--blue),var(--green));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.login-logo-text{font-family:var(--font-head);font-size:22px;font-weight:800;letter-spacing:-0.02em}
.login-logo-text span{color:var(--green)}
.login-title{font-family:var(--font-head);font-size:26px;font-weight:800;margin-bottom:8px;letter-spacing:-0.03em}
.login-sub{color:var(--muted);font-size:14px;margin-bottom:32px;line-height:1.5}
.input-wrap{position:relative;margin-bottom:16px}
.input-wrap input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;color:var(--text);font-family:var(--font-mono);font-size:13px;outline:none;transition:border-color 0.2s}
.input-wrap input:focus{border-color:var(--blue)}
.input-wrap input::placeholder{color:var(--dim)}
.btn-primary{width:100%;background:linear-gradient(135deg,var(--blue),#3b4fd4);border:none;border-radius:10px;padding:14px;color:#fff;font-family:var(--font-head);font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.2s,transform 0.1s;letter-spacing:0.01em}
.btn-primary:hover{opacity:0.9}
.btn-primary:active{transform:scale(0.99)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.login-err{color:var(--red);font-size:12px;margin-top:12px}

/* LAYOUT */
.app{position:relative;z-index:1}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.topbar-left{display:flex;align-items:center;gap:14px}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),var(--green));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.logo-text{font-family:var(--font-head);font-size:16px;font-weight:800;letter-spacing:-0.02em}
.logo-text span{color:var(--green)}
.topbar-right{display:flex;align-items:center;gap:12px}
.plan-badge{font-family:var(--font-mono);font-size:10px;font-weight:600;padding:4px 10px;border-radius:20px;letter-spacing:0.05em;text-transform:uppercase}
.plan-trial{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber)44}
.plan-pro{background:var(--green-dim);color:var(--green);border:1px solid var(--green-mid)}
.plan-agency{background:var(--purple-dim);color:var(--purple);border:1px solid var(--purple)44}
.user-name{color:var(--muted);font-size:13px}
.signout-btn{background:transparent;border:1px solid var(--border2);border-radius:8px;padding:6px 12px;color:var(--muted);font-size:12px;cursor:pointer;transition:all 0.2s}
.signout-btn:hover{border-color:var(--red);color:var(--red)}

/* MAIN */
.main{padding:28px;max-width:1320px;margin:0 auto}

/* ROI WALL */
.roi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
@media(max-width:900px){.roi-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.roi-grid{grid-template-columns:1fr}}
.roi-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px 20px;position:relative;overflow:hidden;transition:border-color 0.2s}
.roi-card:hover{border-color:var(--border2)}
.roi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:16px 16px 0 0}
.roi-card.green::before{background:linear-gradient(90deg,var(--green),transparent)}
.roi-card.blue::before{background:linear-gradient(90deg,var(--blue),transparent)}
.roi-card.amber::before{background:linear-gradient(90deg,var(--amber),transparent)}
.roi-card.purple::before{background:linear-gradient(90deg,var(--purple),transparent)}
.roi-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px}
.roi-value{font-family:var(--font-mono);font-size:36px;font-weight:700;line-height:1;letter-spacing:-0.03em;margin-bottom:6px}
.roi-card.green .roi-value{color:var(--green)}
.roi-card.blue .roi-value{color:var(--blue)}
.roi-card.amber .roi-value{color:var(--amber)}
.roi-card.purple .roi-value{color:var(--purple)}
.roi-sub{font-size:12px;color:var(--muted)}
.roi-bg-num{position:absolute;right:-10px;bottom:-14px;font-family:var(--font-mono);font-size:72px;font-weight:800;opacity:0.04;line-height:1;pointer-events:none;user-select:none}

/* 14 DAY BANNER */
.improvement-banner{background:linear-gradient(135deg,#0d1a2e,#0d1f1a);border:1px solid var(--green-mid);border-radius:16px;padding:24px 28px;margin-bottom:28px;position:relative;overflow:hidden}
.improvement-banner::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:radial-gradient(circle,var(--green)18,transparent 70%);opacity:0.06}
.imp-header{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.imp-title{font-family:var(--font-head);font-size:16px;font-weight:700}
.imp-badge{background:var(--green-dim);color:var(--green);font-family:var(--font-mono);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid var(--green-mid);letter-spacing:0.05em}
.imp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:700px){.imp-grid{grid-template-columns:repeat(2,1fr)}}
.imp-item{text-align:center}
.imp-before{font-family:var(--font-mono);font-size:18px;color:var(--dim);font-weight:600}
.imp-arrow{color:var(--green);font-size:18px;margin:2px 0}
.imp-after{font-family:var(--font-mono);font-size:26px;color:var(--green);font-weight:700}
.imp-label{font-size:11px;color:var(--muted);margin-top:4px}

/* TRIAL COUNTDOWN */
.trial-bar{background:linear-gradient(135deg,#1a1200,#1a0800);border:1px solid var(--amber)33;border-radius:12px;padding:14px 20px;margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.trial-text{font-size:13px;color:var(--amber)}
.trial-text strong{font-family:var(--font-mono);font-size:16px}
.upgrade-btn{background:var(--amber);color:#000;border:none;border-radius:8px;padding:8px 18px;font-family:var(--font-head);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity 0.2s}
.upgrade-btn:hover{opacity:0.85}

/* TABS */
.tabs-wrap{display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:24px;overflow-x:auto}
.tab-btn{flex-shrink:0;padding:8px 16px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{background:var(--card2);color:var(--text);font-weight:600}
.tab-btn .tab-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* SECTION HEADINGS */
.section-head{display:flex;align-items:baseline;gap:10px;margin-bottom:18px}
.section-title{font-family:var(--font-head);font-size:18px;font-weight:700;letter-spacing:-0.02em}
.section-count{font-family:var(--font-mono);font-size:12px;color:var(--muted)}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px}
.card-title{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:16px}

/* GRID LAYOUTS */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:780px){.grid-2,.grid-3{grid-template-columns:1fr}}

/* INTENT BAR CHART */
.intent-bar-wrap{display:flex;flex-direction:column;gap:10px}
.intent-row{display:flex;align-items:center;gap:12px}
.intent-label{font-size:12px;color:var(--muted);width:130px;flex-shrink:0;text-transform:capitalize}
.intent-track{flex:1;background:var(--surface);border-radius:4px;height:8px;overflow:hidden}
.intent-fill{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.16,1,.3,1)}
.intent-num{font-family:var(--font-mono);font-size:12px;color:var(--text);width:32px;text-align:right;flex-shrink:0}

/* STYLE DNA */
.dna-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
@media(max-width:700px){.dna-grid{grid-template-columns:1fr 1fr}}
.dna-category{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px}
.dna-cat-label{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px}
.dna-cat-count{font-family:var(--font-mono);font-size:28px;font-weight:700;line-height:1;margin-bottom:4px}
.dna-cat-sub{font-size:11px;color:var(--dim)}
.pref-list{display:flex;flex-direction:column;gap:8px}
.pref-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.pref-badge{font-family:var(--font-mono);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;flex-shrink:0;margin-top:1px}
.pref-tone{background:var(--blue-dim);color:var(--blue)}
.pref-length{background:var(--green-dim);color:var(--green)}
.pref-content{background:var(--purple-dim);color:var(--purple)}
.pref-policy{background:var(--amber-dim);color:var(--amber)}
.pref-greeting{background:#f0abfc22;color:#f0abfc}
.pref-closing{background:#67e8f922;color:#67e8f9}
.pref-text{font-size:13px;line-height:1.4;flex:1}
.pref-seen{font-family:var(--font-mono);font-size:10px;color:var(--dim);margin-left:auto;flex-shrink:0;align-self:center}

/* RISK SHIELD */
.risk-log{display:flex;flex-direction:column;gap:10px}
.risk-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;border-left:3px solid transparent}
.risk-item.high{border-left-color:var(--red)}
.risk-item.medium{border-left-color:var(--amber)}
.risk-item.low{border-left-color:var(--green)}
.risk-item-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.risk-intent{font-family:var(--font-mono);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:0.05em}
.risk-intent.high{background:var(--red-dim);color:var(--red)}
.risk-intent.medium{background:var(--amber-dim);color:var(--amber)}
.risk-intent.low{background:var(--green-dim);color:var(--green)}
.risk-date{font-size:11px;color:var(--dim);margin-left:auto}
.risk-msg{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.risk-shield-tag{font-size:11px;color:var(--green);margin-top:4px;display:flex;align-items:center;gap:4px}

/* FEEDBACK */
.feedback-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
@media(max-width:600px){.feedback-stats{grid-template-columns:1fr}}
.fb-stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.fb-stat-num{font-family:var(--font-mono);font-size:32px;font-weight:700;line-height:1}
.fb-stat-label{font-size:12px;color:var(--muted);margin-top:4px}
.case-list{display:flex;flex-direction:column;gap:8px}
.case-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.case-item-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.case-rating{display:flex;gap:2px}
.case-status{font-family:var(--font-mono);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:auto;letter-spacing:0.04em}
.status-draft{background:var(--blue-dim);color:var(--blue)}
.status-sent{background:var(--green-dim);color:var(--green)}
.status-won{background:#00ff8822;color:#00ff88}
.case-comment{font-size:13px;color:var(--muted)}

/* RESPONSE TIME */
.streak-display{text-align:center;padding:28px;background:var(--surface);border-radius:12px;margin-bottom:20px}
.streak-num{font-family:var(--font-mono);font-size:64px;font-weight:700;color:var(--amber);line-height:1}
.streak-label{font-size:14px;color:var(--muted);margin-top:8px}
.streak-fire{font-size:32px;margin-bottom:8px}

/* MINI SPARKLINE */
.sparkline-wrap{display:flex;align-items:flex-end;gap:3px;height:48px}
.spark-bar{flex:1;border-radius:3px 3px 0 0;transition:height 0.5s ease;min-height:3px;max-height:48px}

/* HISTORY TABLE */
.history-table{width:100%;border-collapse:collapse}
.history-table th{font-size:11px;font-weight:600;color:var(--dim);letter-spacing:0.06em;text-transform:uppercase;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
.history-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:top}
.history-table tr:last-child td{border-bottom:none}
.history-table tr:hover td{background:var(--surface)}
.msg-cell{max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted)}
.route-pill{font-family:var(--font-mono);font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600}
.route-rule{background:#ffffff08;color:var(--dim)}
.route-mini{background:var(--blue-dim);color:var(--blue)}
.route-large{background:var(--purple-dim);color:var(--purple)}

/* MINI STAT ROW */
.mini-stats{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:20px}
.mini-stat{display:flex;flex-direction:column;gap:2px}
.mini-stat-val{font-family:var(--font-mono);font-size:22px;font-weight:700}
.mini-stat-label{font-size:11px;color:var(--muted)}

/* LOADING */
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--card2) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* COUNTER ANIMATION */
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.count-anim{animation:countUp 0.6s cubic-bezier(.16,1,.3,1) both}

/* DOT GRID BG */
.section-content{animation:fadeIn 0.3s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* EMPTY STATE */
.empty-state{text-align:center;padding:48px 24px;color:var(--dim)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-text{font-size:14px;line-height:1.5}

/* VOICE FINGERPRINT */
.voice-fp{background:linear-gradient(135deg,var(--surface),#0d1a1a);border:1px solid var(--green-mid);border-radius:14px;padding:20px;margin-bottom:20px}
.vfp-title{font-size:11px;font-weight:700;color:var(--green);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:16px}
.vfp-traits{display:flex;flex-wrap:wrap;gap:8px}
.vfp-trait{background:var(--green-dim);border:1px solid var(--green-mid);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--green);display:flex;align-items:center;gap:6px}
.vfp-trait::before{content:'✦';font-size:9px;opacity:0.7}

/* TOOLTIP */
.tooltip-wrap{position:relative;display:inline-block}
.tooltip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1c2035;border:1px solid var(--border2);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--text);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:10}
.tooltip-wrap:hover .tooltip{opacity:1}

/* ROI HOURLY RATE */
.hourly-input-wrap{display:flex;align-items:center;gap:8px;margin-top:8px}
.hourly-input-wrap span{font-size:13px;color:var(--muted)}
.hourly-input{background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;color:var(--text);font-family:var(--font-mono);font-size:13px;width:80px;outline:none}
.hourly-input:focus{border-color:var(--green)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const API = 'https://replymate-backend-production.up.railway.app';

// ── Helpers ──────────────────────────────────────────────────────────────
function api(path, key, opts = {}) {
  return fetch(`${API}${path}`, {
    ...opts,
    headers: { 'x-license-key': key, 'Content-Type': 'application/json', ...(opts.headers || {}) }
  }).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });
}

function fmt(n) {
  if (n === null || n === undefined) return '—';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return String(Math.round(n));
}

function fmtGBP(n) {
  if (!n) return '£0';
  if (n >= 1000) return '£' + (n / 1000).toFixed(1) + 'k';
  return '£' + Math.round(n);
}

function useCountUp(target, duration = 1200, delay = 0) {
  const [val, setVal] = useState(0);
  const started = useRef(false);
  useEffect(() => {
    if (target === 0 || started.current) return;
    started.current = true;
    const timer = setTimeout(() => {
      const start = Date.now();
      const step = () => {
        const elapsed = Date.now() - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        setVal(Math.round(eased * target));
        if (progress < 1) requestAnimationFrame(step);
      };
      requestAnimationFrame(step);
    }, delay);
    return () => clearTimeout(timer);
  }, [target]);
  return val;
}

const INTENT_COLORS = {
  tracking: '#4361ee', return: '#ef4444', refund: '#ef4444',
  positive_feedback: '#00d68f', shipping_inquiry: '#a855f7',
  item_question: '#f7b731', payment_confirmation: '#00d68f',
  availability: '#67e8f9', dispatch_confirmation: '#4361ee',
  cancellation: '#f7b731', general: '#8892a4', damaged_item: '#ef4444',
  discount_request: '#f7b731', off_platform: '#a855f7'
};

const PREF_COLORS = {
  tone: 'pref-tone', length: 'pref-length', content: 'pref-content',
  policy: 'pref-policy', greeting: 'pref-greeting', closing: 'pref-closing'
};

// ── Counter Component ────────────────────────────────────────────────────
function Counter({ value, prefix = '', suffix = '', delay = 0 }) {
  const v = useCountUp(typeof value === 'number' ? value : 0, 1200, delay);
  if (typeof value !== 'number') return <span>{value}</span>;
  return <span className="count-anim" style={{ animationDelay: delay + 'ms' }}>
    {prefix}{v.toLocaleString()}{suffix}
  </span>;
}

// ── Sparkline ────────────────────────────────────────────────────────────
function Sparkline({ data, color = '#4361ee' }) {
  if (!data || !data.length) return null;
  const max = Math.max(...data, 1);
  return (
    <div className="sparkline-wrap">
      {data.map((v, i) => (
        <div key={i} className="spark-bar" style={{
          height: Math.max((v / max) * 48, 3),
          background: i === data.length - 1 ? color : color + '55'
        }} />
      ))}
    </div>
  );
}

// ── Login Screen ──────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [key, setKey] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const submit = async () => {
    if (!key.trim()) return;
    setLoading(true); setErr('');
    try {
      await api('/customer/profile', key.trim());
      onLogin(key.trim());
    } catch (e) {
      setErr('Invalid license key. Check your welcome email.');
    }
    setLoading(false);
  };
  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-logo">
          <div className="login-logo-mark">✦</div>
          <div className="login-logo-text">Reply<span>Mate</span> Pro</div>
        </div>
        <div className="login-title">Command Centre</div>
        <div className="login-sub">Enter your license key to access your seller dashboard and performance intelligence.</div>
        <div className="input-wrap">
          <input value={key} onChange={e => setKey(e.target.value)}
            placeholder="RM-XXXX-XXXX-XXXX-XXXX"
            onKeyDown={e => e.key === 'Enter' && submit()} />
        </div>
        <button className="btn-primary" onClick={submit} disabled={loading || !key.trim()}>
          {loading ? 'Verifying...' : 'Open Dashboard →'}
        </button>
        {err && <div className="login-err">{err}</div>}
      </div>
    </div>
  );
}

// ── 14-Day Improvement Banner ─────────────────────────────────────────────
function ImprovementBanner({ profile, usage }) {
  const joinedAt = profile?.created_at ? new Date(profile.created_at) : null;
  if (!joinedAt) return null;

  const daysSinceJoin = Math.floor((Date.now() - joinedAt.getTime()) / (1000 * 60 * 60 * 24));
  if (daysSinceJoin < 7) return null;

  // Store baseline on first render
  const baselineKey = 'rm_baseline_v1';
  let baseline = null;
  try { baseline = JSON.parse(localStorage.getItem(baselineKey)); } catch {}
  if (!baseline && usage) {
    baseline = { replies: 0, hours: 0, risk: 0 };
    localStorage.setItem(baselineKey, JSON.stringify(baseline));
  }
  if (!baseline || !usage) return null;

  const current = usage.all_time || {};
  const currentReplies = current.replies || 0;
  const currentHours = Math.round(currentReplies * 8 / 60 * 10) / 10;
  const currentRisk = (usage.top_intents || []).filter(([i]) => ['refund','return','cancellation','damaged_item'].includes(i)).reduce((s, [,n]) => s + n, 0);
  const rate = parseFloat(localStorage.getItem('rm_hourly') || '25');
  const timeSaved = Math.round(currentHours * rate);

  const metrics = [
    { label: 'Total Replies', before: baseline.replies, after: currentReplies },
    { label: 'Hours Saved', before: '0h', after: currentHours + 'h' },
    { label: 'Time Value', before: '£0', after: '£' + timeSaved },
    { label: 'Complex Cases', before: baseline.risk, after: currentRisk },
  ];

  return (
    <div className="improvement-banner">
      <div className="imp-header">
        <div className="imp-title">📈 Your ReplyMate Impact</div>
        <div className="imp-badge">{daysSinceJoin} DAYS IN</div>
      </div>
      <div className="imp-grid">
        {metrics.map((m, i) => (
          <div className="imp-item" key={i}>
            <div className="imp-before">{m.before}</div>
            <div className="imp-arrow">↓</div>
            <div className="imp-after">{m.after}</div>
            <div className="imp-label">{m.label}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────
function App() {
  const [licenseKey, setLicenseKey] = useState(() => localStorage.getItem('rm_license_key') || '');
  const [profile, setProfile] = useState(null);
  const [usage, setUsage] = useState(null);
  const [insights, setInsights] = useState(null);
  const [activeTab, setActiveTab] = useState('overview');
  const [loading, setLoading] = useState(false);

  const load = useCallback(async (key) => {
    setLoading(true);
    try {
      const [p, u, ins] = await Promise.all([
        api('/customer/profile', key),
        api('/usage/summary', key),
        api('/reply/seller/insights', key),
      ]);
      setProfile(p);
      setUsage(u);
      setInsights(ins);
    } catch (e) {
      setLicenseKey('');
      localStorage.removeItem('rm_license_key');
    }
    setLoading(false);
  }, []);

  useEffect(() => { if (licenseKey) load(licenseKey); }, [licenseKey]);

  const handleLogin = (key) => {
    localStorage.setItem('rm_license_key', key);
    setLicenseKey(key);
  };

  const signOut = () => {
    localStorage.removeItem('rm_license_key');
    setLicenseKey(''); setProfile(null); setUsage(null); setInsights(null);
  };

  if (!licenseKey) return <LoginScreen onLogin={handleLogin} />;
  if (loading) return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16, background: 'var(--bg)' }}>
      <div style={{ width: 40, height: 40, background: 'linear-gradient(135deg,var(--blue),var(--green))', borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }}>✦</div>
      <div style={{ color: 'var(--muted)', fontFamily: 'var(--font-mono)', fontSize: 13, letterSpacing: '0.05em' }}>Loading your dashboard...</div>
      <div style={{ width: 180, height: 2, background: 'var(--border)', borderRadius: 2, overflow: 'hidden' }}>
        <div style={{ height: '100%', background: 'linear-gradient(90deg,var(--blue),var(--green))', borderRadius: 2, animation: 'loadBar 1.2s ease-in-out infinite' }} />
      </div>
      <style>{`@keyframes loadBar{0%{width:0%;margin-left:0}50%{width:80%}100%{width:0%;margin-left:100%}}`}</style>
    </div>
  );
  if (!profile) return <LoginScreen onLogin={handleLogin} />;

  const thisMonth = usage?.this_month || {};
  const allTime = usage?.all_time || {};
  const hours = Math.round((allTime.replies || 0) * 8 / 60 * 10) / 10;
  const rate = parseFloat(localStorage.getItem('rm_hourly') || '25');
  const timeSaved = Math.round(hours * rate);
  const riskHandled = (usage?.top_intents || []).filter(([i]) =>
    ['refund','return','cancellation','damaged_item'].includes(i)
  ).reduce((s, [,n]) => s + n, 0);

  const planClass = profile.plan === 'trial' ? 'plan-trial' : profile.plan === 'agency' ? 'plan-agency' : 'plan-pro';
  const planLabel = profile.plan === 'trial'
    ? `Trial — ${profile.trial_days_left}d left`
    : profile.plan === 'agency' ? 'Agency' : 'Pro';

  return (
    <div className="app">
      {/* TOP BAR */}
      <div className="topbar">
        <div className="topbar-left">
          <div className="logo-mark">✦</div>
          <div className="logo-text">Reply<span>Mate</span> Pro</div>
          <span style={{ color: 'var(--border2)', fontSize: 20 }}>|</span>
          <span style={{ fontSize: 12, color: 'var(--dim)', fontFamily: 'var(--font-mono)' }}>Command Centre</span>
        </div>
        <div className="topbar-right">
          <span className={`plan-badge ${planClass}`}>{planLabel}</span>
          <span className="user-name">{profile.business_name || profile.name}</span>
          <button className="signout-btn" onClick={signOut}>Sign out</button>
        </div>
      </div>

      <div className="main">
        {/* TRIAL BAR */}
        {profile.plan === 'trial' && profile.trial_days_left <= 7 && (
          <div className="trial-bar">
            <div className="trial-text">
              <strong>{profile.trial_days_left} days</strong> remaining in your trial — upgrade to keep your Style DNA and all reply history.
            </div>
            <button className="upgrade-btn" onClick={() => window.open('https://replymate.pro/#pricing', '_blank')}>
              Upgrade Now →
            </button>
          </div>
        )}

        {/* 14 DAY IMPROVEMENT BANNER */}
        <ImprovementBanner profile={profile} usage={usage} />

        {/* ROI WALL */}
        <div className="roi-grid">
          <ROICard label="Replies Generated" value={allTime.replies || 0} color="blue" bgNum="∞" delay={0}
            sub={`${thisMonth.replies || 0} this month`} tooltip="Total AI replies generated across all time" />
          <ROICard label="Hours Saved" value={hours} suffix="h" color="green" bgNum="⏱" delay={100}
            sub="at 8 min avg per reply" />
          <ROICard label="Time Value Saved" prefix="£" value={timeSaved} color="amber" bgNum="£" delay={200}
            sub={`at £${rate}/hr — adjust in Overview`} />
          <ROICard label="Complex Cases Handled" value={riskHandled} color="purple" bgNum="⚡" delay={300}
            sub="returns, refunds, cancellations" tooltip="Messages classified as high-risk handled by the AI agent" />
        </div>

        {/* TABS */}
        <div className="tabs-wrap">
          {TABS.map(t => (
            <button key={t.id} className={`tab-btn ${activeTab === t.id ? 'active' : ''}`}
              onClick={() => setActiveTab(t.id)}>
              <span style={{ color: t.color, fontSize: 11 }}>{t.icon}</span>
              {t.label}
            </button>
          ))}
        </div>

        {/* TAB CONTENT */}
        {activeTab === 'overview'  && <OverviewTab  usage={usage} profile={profile} key="ov" />}
        {activeTab === 'intel'     && <IntelTab     usage={usage} key="in" />}
        {activeTab === 'dna'       && <DNATab       insights={insights} key="dna" />}
        {activeTab === 'risk'      && <RiskTab      licenseKey={licenseKey} key="risk" />}
        {activeTab === 'feedback'  && <FeedbackTab  licenseKey={licenseKey} key="fb" />}
        {activeTab === 'history'   && <HistoryTab   licenseKey={licenseKey} key="hist" />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
